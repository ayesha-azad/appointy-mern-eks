# Frontend server
server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html/frontend;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Admin panel server
server {
    listen 8080;
    server_name localhost;
    
    root /usr/share/nginx/html/admin;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Backend API proxy (optional - for if you want to proxy)
# But since frontend connects directly to localhost:4000, this is not needed