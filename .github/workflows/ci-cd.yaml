name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]

env:
  KUBE_NAMESPACE: appointy
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      working-directory: ./backend
      run: npm install

    - name: Run tests
      working-directory: ./backend
      run: npm test || echo "No tests found, continuing..."

  build-and-push-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Registry
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push Backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/appointy-backend:${{ env.IMAGE_TAG }}
          ${{ secrets.DOCKER_USERNAME }}/appointy-backend:latest

  build-and-push-admin-frontend:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, admin]
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Registry
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.service }}
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/appointy-${{ matrix.service }}:${{ env.IMAGE_TAG }}
          ${{ secrets.DOCKER_USERNAME }}/appointy-${{ matrix.service }}:latest
  
  deploy:
    needs: [build-and-push-backend, build-and-push-admin-frontend]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4.1.0
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Create namespace
      run: |
        kubectl create namespace ${{ env.KUBE_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

    - name: Install SealedSecrets Controller
      run: |
        kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.0/controller.yaml
        kubectl rollout status deployment/sealed-secrets-controller -n kube-system --timeout=2m

    - name: Apply Sealed Secrets
      run: kubectl apply -f k8s/sealed-secrets.yaml

    - name: Apply ConfigMap
      run: kubectl apply -f k8s/configmap.yaml

    - name: Install AWS EBS CSI Driver
      run: |
        kubectl apply -k "github.com/kubernetes-sigs/aws-ebs-csi-driver/deploy/kubernetes/overlays/stable/?ref=release-1.33"
        kubectl rollout status daemonset/ebs-csi-node -n kube-system --timeout=2m
        kubectl rollout status deployment/ebs-csi-controller -n kube-system --timeout=2m

    - name: Create EBS CSI StorageClass
      run: |
        cat <<EOF | kubectl apply -f -
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: gp3-csi
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
        provisioner: ebs.csi.aws.com
        volumeBindingMode: WaitForFirstConsumer
        allowVolumeExpansion: true
        parameters:
          type: gp3
          fsType: ext4
        EOF
        # Remove default annotation from old gp2
        kubectl annotate storageclass gp2 storageclass.kubernetes.io/is-default-class- --ignore-not-found=true

    - name: Deploy MongoDB
      run: |
        kubectl apply -f k8s/mongodb.yaml
        kubectl rollout status statefulset/mongodb -n ${{ env.KUBE_NAMESPACE }} --timeout=15m

    - name: Deploy Backend
      run: |
        sed -i "s|\${DOCKER_USERNAME}|${{ secrets.DOCKER_USERNAME }}|g" k8s/backend-deployment.yaml
        kubectl apply -f k8s/backend-deployment.yaml
        kubectl apply -f k8s/backend-service.yaml
        kubectl rollout status deployment/appointy-backend -n ${{ env.KUBE_NAMESPACE }} --timeout=15m || \
          (kubectl rollout undo deployment/appointy-backend -n ${{ env.KUBE_NAMESPACE }} && exit 1)

    - name: Deploy Frontend
      run: |
        sed -i "s|\${DOCKER_USERNAME}|${{ secrets.DOCKER_USERNAME }}|g" k8s/frontend-deployment.yaml
        kubectl apply -f k8s/frontend-deployment.yaml
        kubectl rollout status deployment/appointy-frontend -n ${{ env.KUBE_NAMESPACE }} --timeout=15m || \
          (kubectl rollout undo deployment/appointy-frontend -n ${{ env.KUBE_NAMESPACE }} && exit 1)

    - name: Deploy Admin
      run: |
        sed -i "s|\${DOCKER_USERNAME}|${{ secrets.DOCKER_USERNAME }}|g" k8s/admin-deployment.yaml
        kubectl apply -f k8s/admin-deployment.yaml
        kubectl rollout status deployment/appointy-admin -n ${{ env.KUBE_NAMESPACE }} --timeout=15m || \
          (kubectl rollout undo deployment/appointy-admin -n ${{ env.KUBE_NAMESPACE }} && exit 1)
    
    - name: Verify deployment
      run: |
        kubectl get pods -n ${{ env.KUBE_NAMESPACE }}
        kubectl get svc -n ${{ env.KUBE_NAMESPACE }}