name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]

env:
  KUBE_NAMESPACE: appointy
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      working-directory: ./backend
      run: npm install
    
    - name: Run tests
      working-directory: ./backend
      run: npm test || echo "No tests found, continuing..."
  
  build-and-push-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Registry
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push Backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/appointy-backend:${{ env.IMAGE_TAG }}
          ${{ secrets.DOCKER_USERNAME }}/appointy-backend:latest

  build-and-push-admin-frontend:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, admin]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Registry
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.service }}
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/appointy-${{ matrix.service }}:${{ env.IMAGE_TAG }}
          ${{ secrets.DOCKER_USERNAME }}/appointy-${{ matrix.service }}:latest
  
  deploy:
    needs: [build-and-push-backend, build-and-push-admin-frontend]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        kubeconfig: ${{ secrets.KUBE_CONFIG }}
    
    - name: Create namespace
      run: |
        kubectl create namespace ${{ env.KUBE_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Apply Sealed Secrets
      run: kubectl apply -f k8s/sealed-secrets.yaml
    
    - name: Apply ConfigMap
      run: kubectl apply -f k8s/configmap.yaml
    
    - name: Deploy MongoDB
      run: |
        kubectl apply -f k8s/mongodb.yaml
        kubectl rollout status statefulset/mongodb -n ${{ env.KUBE_NAMESPACE }} --timeout=5m
    
    - name: Deploy Backend
      run: |
        kubectl set image deployment/appointy-backend \
          backend=${{ secrets.DOCKER_USERNAME }}/appointy-backend:${{ env.IMAGE_TAG }} \
          -n ${{ env.KUBE_NAMESPACE }} || \
        kubectl apply -f k8s/backend-deployment.yaml
        
        kubectl apply -f k8s/backend-service.yaml
        
        kubectl rollout status deployment/appointy-backend \
          -n ${{ env.KUBE_NAMESPACE }} --timeout=5m || \
        (kubectl rollout undo deployment/appointy-backend -n ${{ env.KUBE_NAMESPACE }} && exit 1)
    
    - name: Deploy Frontend
      run: |
        kubectl set image deployment/appointy-frontend \
          frontend=${{ secrets.DOCKER_USERNAME }}/appointy-frontend:${{ env.IMAGE_TAG }} \
          -n ${{ env.KUBE_NAMESPACE }} || \
        kubectl apply -f k8s/frontend-deployment.yaml
        
        kubectl rollout status deployment/appointy-frontend \
          -n ${{ env.KUBE_NAMESPACE }} --timeout=2m || \
        (kubectl rollout undo deployment/appointy-frontend -n ${{ env.KUBE_NAMESPACE }} && exit 1)
    
    - name: Deploy Admin
      run: |
        kubectl set image deployment/appointy-admin \
          admin=${{ secrets.DOCKER_USERNAME }}/appointy-admin:${{ env.IMAGE_TAG }} \
          -n ${{ env.KUBE_NAMESPACE }} || \
        kubectl apply -f k8s/admin-deployment.yaml
        
        kubectl rollout status deployment/appointy-admin \
          -n ${{ env.KUBE_NAMESPACE }} --timeout=2m || \
        (kubectl rollout undo deployment/appointy-admin -n ${{ env.KUBE_NAMESPACE }} && exit 1)
    
    - name: Verify deployment
      run: |
        kubectl get pods -n ${{ env.KUBE_NAMESPACE }}
        kubectl get svc -n ${{ env.KUBE_NAMESPACE }}