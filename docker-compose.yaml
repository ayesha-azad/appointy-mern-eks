services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secretpassword
    volumes:
      - mongo_data:/data/db
    networks:
      - appointy-network

  appointy-backend:
    build: 
      context: ./backend
    container_name: appointy-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://admin:secretpassword@mongodb:27017?authSource=admin
      - JWT_SECRET=your-jwt-secret
      - ADMIN_EMAIL=admin@appointy.com
      - ADMIN_PASSWORD=admin123
      - CLOUDINARY_NAME=your-cloudinary-name
      - CLOUDINARY_API_KEY=your-cloudinary-api-key
      - CLOUDINARY_SECRET_KEY=your-cloudinary-secret-key
      - FRONTEND_URL=http://localhost:3000
      - ADMIN_URL=http://localhost:3001
    depends_on:
      - mongodb
    networks:
      - appointy-network

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: appointy-nginx
    restart: always
    ports:
      - "3000:80"    # Frontend
      - "3001:8080"  # Admin panel 
    depends_on:
      - appointy-backend
    networks:
      - appointy-network

networks:
  appointy-network:
    driver: bridge

volumes:
  mongo_data: